<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#863bff"/>
  <!-- T-account: top horizontal bar -->
  <rect x="6" y="8.5" width="20" height="3" rx="1.5" fill="white"/>
  <!-- T-account: vertical center stem -->
  <rect x="14.5" y="8.5" width="3" height="16" rx="1.5" fill="white"/>
  <!-- Debit entry lines (left column) -->
  <rect x="7.5" y="15" width="5.5" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="7.5" y="18.5" width="4" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <!-- Credit entry lines (right column) -->
  <rect x="19" y="15" width="5.5" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="19" y="18.5" width="4" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
</svg>
